name: MixPulse Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout JUCE tag 7.0.11
        id: juce_tag
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 7.0.11
          path: _deps/JUCE

      - name: Checkout JUCE master fallback
        if: steps.juce_tag.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: master
          path: _deps/JUCE

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S mixpulse -B mixpulse/build -DJUCE_DIR=${{ github.workspace }}/_deps/JUCE -DCMAKE_BUILD_TYPE=Release -DMIXPULSE_BUILD_VST3=OFF -DMIXPULSE_BUILD_STANDALONE=ON -DMIXPULSE_BUILD_AU=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S mixpulse -B mixpulse/build -DJUCE_DIR=${{ github.workspace }}/_deps/JUCE -DCMAKE_BUILD_TYPE=Release -DMIXPULSE_BUILD_VST3=OFF -DMIXPULSE_BUILD_STANDALONE=ON -DMIXPULSE_BUILD_AU=OFF

      - name: Build
        run: cmake --build mixpulse/build --config Release --target MixPulse

      - name: Debug output tree (macOS/Linux shell)
        if: runner.os != 'Windows'
        run: |
          find mixpulse/build -maxdepth 8 -type d
          find mixpulse/build -maxdepth 8 -type f

      - name: Debug output tree (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem -Path mixpulse/build -Recurse | Select-Object FullName

    - name: Package standalone beta artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path beta/MixPulse-Windows-Beta | Out-Null

          $candidates = Get-ChildItem -Path mixpulse/build -Recurse -File |
            Where-Object {
              $_.Name -like "*MixPulse*" -or
              $_.Name -like "*.exe" -or
              $_.Name -like "*.dll" -or
              $_.Name -like "*.vst3"
            }

          $candidates | ForEach-Object {
            Copy-Item $_.FullName -Destination beta/MixPulse-Windows-Beta -Force -ErrorAction SilentlyContinue
          }

          @(
            "Standalone beta build."
            "Run MixPulse.exe directly if included."
            "If no EXE is present, inspect the included build output files."
            "Unsigned beta build."
          ) | Set-Content -Path beta/MixPulse-Windows-Beta/README_INSTALL.txt

          $count = (Get-ChildItem -Path beta/MixPulse-Windows-Beta | Measure-Object).Count
          if ($count -le 1) { throw "No Windows beta artifacts found after broad discovery." }

      - name: Package standalone beta artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path beta/MixPulse-Windows-Beta | Out-Null
          $exe = Get-ChildItem -Path mixpulse/build -Recurse -File -Filter MixPulse.exe | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName -Destination beta/MixPulse-Windows-Beta -Force }
             @(
            "Standalone beta build."
            "Run MixPulse.exe directly."
            "Unsigned beta build."
          ) | Set-Content -Path beta/MixPulse-Windows-Beta/README_INSTALL.txt
          if (-not $exe) { throw "No standalone beta artifact found" }

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: MixPulse-macOS-Release
          path: beta/MixPulse-macOS-Beta

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: MixPulse-Windows-Release
          path: beta/MixPulse-Windows-Beta
