name: MixPulse Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout JUCE tag 7.0.11
        id: juce_tag
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 7.0.11
          path: _deps/JUCE

      - name: Checkout JUCE master fallback
        if: steps.juce_tag.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: master
          path: _deps/JUCE

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S mixpulse -B mixpulse/build -DJUCE_DIR=${{ github.workspace }}/_deps/JUCE -DCMAKE_BUILD_TYPE=Release -DMIXPULSE_BUILD_VST3=OFF -DMIXPULSE_BUILD_STANDALONE=ON -DMIXPULSE_BUILD_AU=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S mixpulse -B mixpulse/build -DJUCE_DIR=${{ github.workspace }}/_deps/JUCE -DCMAKE_BUILD_TYPE=Release -DMIXPULSE_BUILD_VST3=OFF -DMIXPULSE_BUILD_STANDALONE=ON -DMIXPULSE_BUILD_AU=OFF

      - name: Build
        run: cmake --build mixpulse/build --config Release --target MixPulse

      - name: Debug output tree (macOS/Linux shell)
        if: runner.os != 'Windows'
        run: |
          find mixpulse/build -maxdepth 8 -type d
          find mixpulse/build -maxdepth 8 -type f

      - name: Debug output tree (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path mixpulse/build -Recurse | Select-Object FullName

      - name: Upload full Windows build folder
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: MixPulse-Windows-Build-Folder
          path: mixpulse/build
