name: MixPulse Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout JUCE tag 7.0.11
        id: juce_tag
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 7.0.11
          path: _deps/JUCE

      - name: Checkout JUCE master fallback
        if: steps.juce_tag.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: master
          path: _deps/JUCE

      - name: Configure (Windows)
        shell: pwsh
        run: cmake -S mixpulse -B mixpulse/build -DJUCE_DIR=${{ github.workspace }}/_deps/JUCE -DCMAKE_BUILD_TYPE=Release -DMIXPULSE_BUILD_VST3=ON -DMIXPULSE_BUILD_STANDALONE=ON -DMIXPULSE_BUILD_AU=OFF

      - name: Build (ALL_BUILD, standalone fallback)
        shell: pwsh
        run: |
          cmake --build mixpulse/build --config Release --target ALL_BUILD
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "ALL_BUILD failed; trying MixPulse_Standalone fallback."
            cmake --build mixpulse/build --config Release --target MixPulse_Standalone
            if ($LASTEXITCODE -ne 0) { throw "Both ALL_BUILD and MixPulse_Standalone failed." }
          }

      - name: Debug candidate targets
        shell: pwsh
        if: failure()
        run: cmake --build mixpulse/build --config Release --target help

      - name: Debug output tree (Windows)
        shell: pwsh
        run: Get-ChildItem -Path mixpulse/build -Recurse | Select-Object FullName

      - name: Debug EXE discovery
        shell: pwsh
        run: Get-ChildItem -Path mixpulse/build -Recurse -File -Filter *.exe | Select-Object FullName

      - name: Debug VST3 discovery
        shell: pwsh
        run: Get-ChildItem -Path mixpulse/build -Recurse -Directory -Filter *.vst3 | Select-Object FullName

      - name: Debug MixPulse discovery
        shell: pwsh
        run: Get-ChildItem -Path mixpulse/build -Recurse | Where-Object { $_.Name -like "*MixPulse*" } | Select-Object FullName


      - name: Debug key output folders
        shell: pwsh
        run: |
          Get-ChildItem -Path mixpulse/build -Recurse -Directory | Where-Object {
            $_.Name -in @('MixPulse_artefacts', 'x64', 'Release', 'Standalone', 'VST3')
          } | Select-Object FullName

      - name: Package beta artifact folder
        shell: pwsh
        run: |
          $betaDir = "beta/MixPulse-Windows-Beta"
          New-Item -ItemType Directory -Path $betaDir -Force | Out-Null

          $readmePath = Join-Path $betaDir "README_INSTALL.txt"
          @(
            "MixPulse Windows Beta"
            ""
            "Standalone:"
            "Run MixPulse.exe directly if included."
            ""
            "VST3:"
            "If MixPulse.vst3 is included, copy it to:"
            "C:\Program Files\Common Files\VST3\"
            ""
            "Then rescan plugins in your DAW."
            ""
            "Notes:"
            "- Unsigned beta build."
            "- Windows may warn on first launch."
            "- VST3 support is experimental in this build."
            "- Audio pass-through should remain unchanged."
          ) | Set-Content -Path $readmePath

          $exeItems = Get-ChildItem -Path mixpulse/build -Recurse -File | Where-Object { $_.Extension -eq ".exe" -and $_.Name -like "*MixPulse*" }
          foreach ($exe in $exeItems) {
            Copy-Item -Path $exe.FullName -Destination (Join-Path $betaDir $exe.Name) -Force
          }

          $vst3Items = Get-ChildItem -Path mixpulse/build -Recurse -Directory -Filter MixPulse.vst3
          foreach ($vst3 in $vst3Items) {
            Copy-Item -Path $vst3.FullName -Destination (Join-Path $betaDir $vst3.Name) -Recurse -Force
          }

          $foundExe = (Get-ChildItem -Path $betaDir -File | Where-Object { $_.Extension -eq ".exe" -and $_.Name -like "*MixPulse*" } | Select-Object -First 1)
          $foundVst3 = (Get-ChildItem -Path $betaDir -Directory -Filter MixPulse.vst3 | Select-Object -First 1)

          if (-not $foundExe -and -not $foundVst3) {
            throw "Neither standalone EXE nor MixPulse.vst3 was found."
          }

          if ($foundVst3) {
            Write-Host "Found VST3: $($foundVst3.FullName)"
          } else {
            Write-Warning "MixPulse.vst3 not found; standalone package still produced."
          }

      - name: Upload beta artifact
        uses: actions/upload-artifact@v4
        with:
          name: MixPulse-Windows-Beta
          path: beta/MixPulse-Windows-Beta

      - name: Upload full build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MixPulse-Windows-Build-Folder
          path: mixpulse/build
