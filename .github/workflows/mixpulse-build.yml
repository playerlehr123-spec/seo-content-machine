name: MixPulse Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache JUCE 7.0.11
        id: juce_cache
        uses: actions/cache@v5
        with:
          path: _deps/JUCE
          key: windows-juce-7.0.11

      - name: Checkout JUCE tag 7.0.11
        id: juce_tag
        if: steps.juce_cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          repository: juce-framework/JUCE
          ref: 7.0.11
          path: _deps/JUCE

      - name: Checkout JUCE master fallback
        if: steps.juce_cache.outputs.cache-hit != 'true' && steps.juce_tag.outcome == 'failure'
        uses: actions/checkout@v6
        with:
          repository: juce-framework/JUCE
          ref: master
          path: _deps/JUCE

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Configure (Windows)
        shell: pwsh
        run: cmake -S mixpulse -B mixpulse/build -DJUCE_DIR=${{ github.workspace }}/_deps/JUCE -DCMAKE_BUILD_TYPE=Release -DMIXPULSE_BUILD_VST3=ON -DMIXPULSE_BUILD_STANDALONE=ON -DMIXPULSE_BUILD_AU=OFF

      - name: Build (ALL_BUILD, standalone fallback)
        shell: pwsh
        run: |
          cmake --build mixpulse/build --config Release --target ALL_BUILD
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "ALL_BUILD failed; trying MixPulse_Standalone fallback."
            cmake --build mixpulse/build --config Release --target MixPulse_Standalone
            if ($LASTEXITCODE -ne 0) { throw "Both ALL_BUILD and MixPulse_Standalone failed." }
          }

      - name: Debug candidate targets
        shell: pwsh
        if: failure()
        continue-on-error: true
        run: |
          try {
            cmake --build mixpulse/build --config Release --target help
          } catch {
            Write-Warning "Candidate target listing failed: $_"
          }
          exit 0

      - name: Debug output tree (Windows)
        shell: pwsh
        run: Get-ChildItem -Path mixpulse/build -Recurse | Select-Object FullName

      - name: Debug EXE discovery
        shell: pwsh
        run: Get-ChildItem -Path mixpulse/build -Recurse -File -Filter *.exe | Select-Object FullName

      - name: Debug VST3 discovery
        shell: pwsh
        run: Get-ChildItem -Path mixpulse/build -Recurse -Directory -Filter *.vst3 | Select-Object FullName

      - name: Debug MixPulse discovery
        shell: pwsh
        run: Get-ChildItem -Path mixpulse/build -Recurse | Where-Object { ($_.Name -like "*MixPulse*" -or $_.Name -like "*WaveFrame*") -or $_.Name -like "*WaveFrame*" } | Select-Object FullName


      - name: Debug key output folders
        shell: pwsh
        run: |
          Get-ChildItem -Path mixpulse/build -Recurse -Directory | Where-Object {
            $_.Name -in @('MixPulse_artefacts', 'x64', 'Release', 'Standalone', 'VST3')
          } | Select-Object FullName

      - name: Package beta artifact folder
        shell: pwsh
        run: |
          $betaDir = "beta/MixPulse-Windows-Beta"
          New-Item -ItemType Directory -Path $betaDir -Force | Out-Null

          $readmePath = Join-Path $betaDir "README_INSTALL.txt"
          $readmeLines = @(
            "WaveFrame Windows Beta",
            "Internal codename/artifact name may still appear as MixPulse.",
            "For full beta testing steps, see mixpulse/docs/BETA_ARTIFACT_TEST_PLAN.md in the repo.",
            "",
            "Standalone:",
            "Run MixPulse.exe directly if included.",
            "",
            "VST3:",
            "If MixPulse.vst3 is included, copy it to:",
            "C:\Program Files\Common Files\VST3\",
            "",
            "Then open your DAW and rescan plugins.",
            "",
            "Ableton:",
            "Preferences > Plug-Ins > Rescan",
            "Then look for MixPulse or WaveFrame.",
            "",
            "FL Studio:",
            "Options > Manage plugins > Find installed plugins",
            "Then look for MixPulse or WaveFrame.",
            "",
            "Manual VST3 test:",
            "1. Load plugin on an audio track.",
            "2. Play audio through the track.",
            "3. Confirm audio passes through unchanged.",
            "4. Confirm meters move.",
            "5. Open/close plugin UI.",
            "6. Test Output button.",
            "7. Test Frame.",
            "8. Test HUD.",
            "9. Remove plugin from track.",
            "10. Reload plugin.",
            "",
            "Manual tests still required:",
            "- UI layout",
            "- mic/input meters",
            "- Frame button",
            "- HUD button",
            "- Creator Output",
            "- fullscreen",
            "- DAW plugin loading",
            "",
            "Notes:",
            "- Unsigned beta build.",
            "- Windows may warn on first launch.",
            "- VST3 support is experimental in this build.",
            "- Do not share public release until DAW test passes.",
            "- Audio pass-through should remain unchanged."
          )
          $readmeLines | Set-Content -Path $readmePath

          $exeItems = Get-ChildItem -Path mixpulse/build -Recurse -File | Where-Object { $_.Extension -eq ".exe" -and ($_.Name -like "*MixPulse*" -or $_.Name -like "*WaveFrame*") }
          foreach ($exe in $exeItems) {
            Copy-Item -Path $exe.FullName -Destination (Join-Path $betaDir $exe.Name) -Force
          }

          $vst3Items = Get-ChildItem -Path mixpulse/build -Recurse -Directory -Filter MixPulse.vst3
          foreach ($vst3 in $vst3Items) {
            Copy-Item -Path $vst3.FullName -Destination (Join-Path $betaDir $vst3.Name) -Recurse -Force
          }

          $foundExe = (Get-ChildItem -Path $betaDir -File | Where-Object { $_.Extension -eq ".exe" -and ($_.Name -like "*MixPulse*" -or $_.Name -like "*WaveFrame*") } | Select-Object -First 1)
          $foundVst3 = (Get-ChildItem -Path $betaDir -Directory -Filter MixPulse.vst3 | Select-Object -First 1)

          if (-not $foundExe -and -not $foundVst3) {
            throw "Neither standalone EXE nor MixPulse.vst3 was found."
          }

          if ($foundVst3) {
            Write-Host "Found VST3: $($foundVst3.FullName)"
          } else {
            Write-Warning "MixPulse.vst3 not found; standalone package still produced."
          }


      - name: Verify beta artifact contents
        shell: pwsh
        run: |
          $betaDir = "beta/MixPulse-Windows-Beta"
          if (-not (Test-Path $betaDir)) { throw "Beta artifact folder missing: $betaDir" }

          $readme = Join-Path $betaDir "README_INSTALL.txt"
          if (-not (Test-Path $readme)) { throw "README_INSTALL.txt missing from beta artifact." }
          Write-Host "FOUND README_INSTALL.txt"

          $exe = Get-ChildItem -Path $betaDir -Recurse -File | Where-Object { $_.Extension -eq ".exe" -and ($_.Name -like "*MixPulse*" -or $_.Name -like "*WaveFrame*") } | Select-Object -First 1
          $vst3 = Get-ChildItem -Path $betaDir -Recurse -Directory | Where-Object { $_.Name -like "*.vst3" } | Select-Object -First 1

          Get-ChildItem -Path $betaDir -Recurse | Select-Object FullName

          if ($exe) { Write-Host "FOUND EXE: $($exe.FullName)" }
          if ($vst3) { Write-Host "FOUND VST3: $($vst3.FullName)" }

          if (-not $exe -and -not $vst3) {
            throw "No EXE or VST3 found in beta artifact. Check build logs and full build folder artifact. Expected EXE: MixPulse.exe or WaveFrame.exe. Expected VST3: MixPulse.vst3"
          }

          Write-Host "BETA ARTIFACT VERIFY PASSED"

      - name: Smoke test standalone EXE
        shell: pwsh
        run: |
          $betaDir = "beta/MixPulse-Windows-Beta"
          $exe = Get-ChildItem -Path $betaDir -Recurse -File | Where-Object { $_.Extension -eq ".exe" -and ($_.Name -like "*MixPulse*" -or $_.Name -like "*WaveFrame*") } | Select-Object -First 1
          $vst3 = Get-ChildItem -Path $betaDir -Recurse -Directory | Where-Object { $_.Name -like "*.vst3" } | Select-Object -First 1
          if (-not $exe -and $vst3) { Write-Host "No standalone EXE found; VST3-only artifact produced."; exit 0 }
          if (-not $exe) { Write-Host "No standalone EXE found for smoke test."; exit 0 }
          Write-Host "Smoke testing EXE: $($exe.FullName)"
          try {
            $proc = Start-Process -FilePath $exe.FullName -PassThru
            Start-Sleep -Seconds 3
            if ($proc.HasExited) {
              Write-Warning "EXE process exited quickly with code $($proc.ExitCode). This may be acceptable in headless CI, but report it."
            } else {
              Stop-Process -Id $proc.Id -Force
              Write-Host "Standalone EXE smoke test passed."
            }
          } catch {
            Write-Warning "EXE smoke test could not start in CI: $_"
            Write-Warning "This does not necessarily mean the app is broken; manual GUI testing is still required."
          }

      - name: VST3 package structure check
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Path beta/MixPulse-Windows-Beta -Recurse -Directory | Where-Object { $_.Name -like "*.vst3" } | Select-Object -First 1
          if (-not $vst3) { Write-Host "No VST3 package found in beta artifact."; exit 0 }
          Get-ChildItem -Path $vst3.FullName -Recurse | Select-Object FullName
          Write-Host "VST3 package structure found. DAW test still required."

      - name: WaveFrame artifact summary
        if: always()
        shell: pwsh
        run: |
          $summary = @(
            "# WaveFrame Build Summary",
            "",
            "- JUCE cache key: windows-juce-7.0.11",
            "- JUCE cache hit: ${{ steps.juce_cache.outputs.cache-hit }}",
            "- Artifact names: MixPulse-Windows-Beta, MixPulse-Windows-Build-Folder",
            ""
          )

          $exeItems = @()
          $vst3Items = @()

          if (Test-Path "beta/MixPulse-Windows-Beta") {
            $exeItems = @(Get-ChildItem -Path beta/MixPulse-Windows-Beta -Recurse -File | Where-Object { $_.Extension -eq ".exe" -and ($_.Name -like "*MixPulse*" -or $_.Name -like "*WaveFrame*") })
            $vst3Items = @(Get-ChildItem -Path beta/MixPulse-Windows-Beta -Recurse -Directory | Where-Object { $_.Name -like "*.vst3" })
          }

          $summary += "## EXE found"
          if ($exeItems.Count -gt 0) {
            foreach ($exe in $exeItems) {
              $summary += "- $($exe.FullName)"
            }
          } else {
            $summary += "- None found"
          }

          $summary += ""
          $summary += "## VST3 found"
          if ($vst3Items.Count -gt 0) {
            foreach ($vst3 in $vst3Items) {
              $summary += "- $($vst3.FullName)"
            }
          } else {
            $summary += "- None found"
          }

          $summary | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Upload beta artifact
        uses: actions/upload-artifact@v4
        with:
          name: MixPulse-Windows-Beta
          path: beta/MixPulse-Windows-Beta

      - name: Upload full build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MixPulse-Windows-Build-Folder
          path: mixpulse/build
